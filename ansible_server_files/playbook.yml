- name: Install Softwares on Windows
  hosts: all
  gather_facts: True
  tasks:
    - name: Stop Broadcasting from client
      win_file:
        path: C:\Windows\Temp\broadcast_received
        state: touch

    - name: Ensure Chocolatey itself is installed, using community repo for the bootstrap
      win_chocolatey:
        name: chocolatey

    - name: Install multiple packages
      win_chocolatey:
        name:
        - libreoffice
        - zoom
        - vlc
        - firefox
        state: present

    # Set up Firefox policies to set homepage and install uBlock Origin extension
    - name: Create Firefox policies folder
      win_file:
        path: C:\Program Files\Mozilla Firefox\distribution
        state: directory

    - name: Set Firefox homepage via policies.json
      win_copy:
        dest: C:\Program Files\Mozilla Firefox\distribution\policies.json
        content: |
          {
            "policies": {
              "Homepage": {
                "URL": "https://www.deanza.edu",
                "Locked": false
              },
              "Preferences": {
                "browser.startup.page": 1,
                "browser.startup.homepage": "https://www.deanza.edu"
              },
              "Extensions": {
                "Install": [
                  "https://addons.mozilla.org/firefox/downloads/latest/ublock-origin/latest.xpi"
                ]
              }
            }
          }

    # Set up Edge policies to open specific URLs on startup
    # - name: Ensure Edge policies key exists
    #   win_regedit:
    #     path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    #     state: present

    # - name: Set Edge to open specific URLs on startup
    #   win_regedit:
    #     path: HKLM:\SOFTWARE\Policies\Microsoft\Edge
    #     name: RestoreOnStartup
    #     type: dword
    #     data: 4

    # - name: Set the startup URLs
    #   win_regedit:
    #     path: HKLM:\SOFTWARE\Policies\Microsoft\Edge\RestoreOnStartupURLs
    #     type: multi_string
    #     data: "https://deanza.edu/"

    # - name: Kill Edge so policy reloads
    #   win_shell: Stop-Process -Name msedge -Force
    #   ignore_errors: yes

    # Set up LibreOffice default save format for all users
    - name: Ensure system-wide LibreOffice registry folder exists
      win_file:
        path: C:\Program Files\LibreOffice\share\registry
        state: directory

    - name: Get all user folders
      win_shell: |
        Get-ChildItem C:\Users -Directory | ForEach-Object { $_.Name }
      register: user_folders

    - name: Ensure destination folder exists on Windows
      ansible.windows.win_file:
        path: C:\\Users\\{{ item }}\\AppData\\Roaming\\LibreOffice\\4\\user
        state: directory
      loop: "{{ user_folders.stdout_lines }}"
      ignore_errors: yes

    - name: Apply LibreOffice default save format for each user
      ansible.builtin.copy:
        src: libreoffice_registrymodifications.xcu
        dest: "C:\\Users\\{{ item }}\\AppData\\Roaming\\LibreOffice\\4\\user\\registrymodifications.xcu"
      loop: "{{ user_folders.stdout_lines }}"
      ignore_errors: yes

    # Update drivers and windows
    - name: Install all available updates including drivers, set a server alive interval during update stage for the ssh connection plugin
      ansible.windows.win_updates:
        category_names: '*'
        reboot: true
      vars:
        # This can be set in a few ways, see the ssh connection plugin for more
        # information. ControlMaster should be disabled to ensure the new timeout
        # value is applied for this connection instead of through the cached
        # connection.
        ansible_ssh_args: -o ControlMaster=no -o ServerAliveInterval=30
