- name: Install Softwares on Windows
  hosts: all
  gather_facts: True
  tasks:
    - name: Stop Broadcasting from client
      win_file:
        path: C:\Windows\CompTechS\broadcast_received
        state: touch

    - name: Ensure Chocolatey itself is installed, using community repo for the bootstrap
      win_chocolatey:
        name: chocolatey

    - name: Install multiple packages
      win_chocolatey:
        name:
        - libreoffice
        - zoom
        - vlc
        - firefox
        state: present

    # Set up Firefox policies to set homepage and install uBlock Origin extension
    - name: Create Firefox policies folder
      win_file:
        path: C:\Program Files\Mozilla Firefox\distribution
        state: directory

    - name: Set Firefox homepage via policies.json
      win_copy:
        dest: C:\Program Files\Mozilla Firefox\distribution\policies.json
        content: |
          {
            "policies": {
              "Homepage": {
                "URL": "https://www.deanza.edu",
                "Locked": false
              },
              "Preferences": {
                "browser.startup.page": 1,
                "browser.startup.homepage": "https://www.deanza.edu"
              },
              "Extensions": {
                "Install": [
                  "https://addons.mozilla.org/firefox/downloads/latest/ublock-origin/latest.xpi"
                ]
              }
            }
          }

    - name: Ensure destination folder exists on Windows
      ansible.windows.win_file:
        path: C:\Users\Student\AppData\Roaming\LibreOffice\4\user
        state: directory

    - name: Apply LibreOffice default save format for each user
      win_copy:
        src: libreoffice_registrymodifications.xcu
        dest: C:\Users\Student\AppData\Roaming\LibreOffice\4\user\registrymodifications.xcu

    # # Update drivers and windows
    # - name: Install all available updates including drivers, set a server alive interval during update stage for the ssh connection plugin
    #   ansible.windows.win_updates:
    #     category_names: '*'
    #     reboot: true
    #   vars:
    #     # This can be set in a few ways, see the ssh connection plugin for more
    #     # information. ControlMaster should be disabled to ensure the new timeout
    #     # value is applied for this connection instead of through the cached
    #     # connection.
    #     ansible_ssh_args: -o ControlMaster=no -o ServerAliveInterval=30

    - name: Copy Win11Debloat.zip to Windows using win_copy module
      win_copy:
        src: Win11Debloat.zip
        dest: C:\Windows\CompTechS\Win11Debloat.zip

    # not idempoten
    - name: Unzip a zip file on Windows using win_unzip module
      community.windows.win_unzip:
        src: C:\Windows\CompTechS\Win11Debloat.zip
        dest: C:\Windows\CompTechS\

    - name: Search recursively for Win11Debloat.ps1 and execute it on Windows
      win_find:
        paths: C:\Windows\CompTechS\
        patterns: Win11Debloat.ps1
        recurse: true
      register: script_path

    - name: Show script path
      ansible.builtin.debug:
        msg: "{{ script_path }}"

    - name: Create scheduled task for admin silent script
      win_scheduled_task:
        name: "RunDebloatAdmin"
        actions:
          - path: "powershell.exe"
            arguments: -ExecutionPolicy Unrestricted -File C:\Windows\CompTechS\Win11Debloat.ps1
        username: Student            # SYSTEM or admin account
        run_level: highest          # runs with admin privileges
        state: present
        # No triggers needed

    - name: Run scheduled task immediately
      win_shell: schtasks /run /TN "RunDebloatAdmin"

    - name: Delete scheduled task after execution
      win_scheduled_task:
        name: "RunDebloatAdmin"
        state: absent

    - name: Create a file to indicate Ansible has completed setup
      win_file:
        path: C:\Users\Student\Desktop\ansible_completed.txt
        state: touch